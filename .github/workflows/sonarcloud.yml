name: SonarCloud Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: |
          cd frontend_reservas
          npm ci

      - name: Run frontend tests (generate coverage)
        run: |
          cd frontend_reservas
          # Ejecuta tests con cobertura; --if-present para no fallar si no hay script
          npm run test --if-present -- --coverage || npm run test --if-present

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage
          if [ -f sistema_reservas_backend/requirements_extra.txt ]; then pip install -r sistema_reservas_backend/requirements_extra.txt; fi

      - name: Run backend tests with coverage
        working-directory: sistema_reservas_backend
        run: |
          python -m coverage run --source=sistema_reservas_backend manage.py test
          python -m coverage xml -o coverage.xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          organization: 'your_organization'
          projectKey: 'your_project_key'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
