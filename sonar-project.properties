sonar.projectKey=your_project_key
sonar.organization=your_organization

# Project display name and version
sonar.projectName=PruebaCloud_Reservas
sonar.projectVersion=1.0

# Sources (comma-separated paths relative to this file)
sonar.sources=frontend_reservas/src,sistema_reservas_backend

# Tests (optional)
sonar.tests=frontend_reservas/src/tests,sistema_reservas_backend

# Coverage report (adjust path if you generate coverage files for frontend)
sonar.javascript.lcov.reportPaths=frontend_reservas/coverage/lcov.info

# Encoding of the source code
sonar.sourceEncoding=UTF-8

# Language-specific settings
sonar.python.version=3.11

# Coverage report paths
sonar.python.coverage.reportPaths=sistema_reservas_backend/coverage.xml

# Exclude dependencies, build artifacts and migrations from analysis
sonar.exclusions=**/node_modules/**,**/frontend_reservas/dist/**,**/frontend_reservas/build/**,**/dist/**,**/build/**,**/.venv/**,**/venv/**,**/sistema_reservas_backend/migrations/**,**/*.min.js,**/coverage/**

# Optional: files to ignore for tests/analysis
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/build/**

# NOTE: replace `your_organization` and `your_project_key` with the values
# provided by SonarCloud (or your SonarQube server). The GitHub Action should
# pass the `SONAR_TOKEN` secret when running the scan.