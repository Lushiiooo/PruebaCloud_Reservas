sonar.projectKey=Lushiiooo_PruebaCloud_Reservas
sonar.organization=lushiiooo

# Project display name and version
sonar.projectName=PruebaCloud_Reservas
sonar.projectVersion=1.0

# Paths are relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=frontend_reservas/src,sistema_reservas_backend

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Define Python files for backend analysis
sonar.python.version=3.11

# Exclude test files and dependencies from analysis
sonar.exclusions=**/tests/**,**/test_*.py,**/node_modules/**,**/.venv/**,**/migrations/**